
name: Weekly AI Feed

on:

  schedule:

    - cron: '0 8 * * 1'

  workflow_dispatch:

jobs:

  collect:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5

        with:

          python-version: '3.11'

      - name: Install dependencies

        run: pip install apify-client anthropic python-dotenv

      - name: Create .env

        run: |

          mkdir -p config

          echo "APIFY_API_TOKEN=${{ secrets.APIFY_API_TOKEN }}" > config/.env

          echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" >> config/.env

      - name: Run pipeline

        run: python scripts/pipeline.py --live

      - name: Commit results

        run: |

          git config user.name "AI Feed Bot"

          git config user.email "bot@ai-feed.local"

          git add data/feeds/*.json

          git diff --staged --quiet || git commit -m "feed: $(date +%Y-%m-%d)"

          git push

